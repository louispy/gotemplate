services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: passwd
      POSTGRES_DB: gotemplate
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gotemplate"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: ["/app/migrate"]
    environment:
      DB_URL: "postgres://postgres:passwd@db:5432/gotemplate?sslmode=disable"
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "25"
      DB_CONN_MAX_LIFETIME: "30m"
      DB_CONN_MAX_IDLETIME: "5m"
      DB_CONN_TIMEOUT: "5s"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: ":8080"
      DB_URL: "postgres://postgres:passwd@db:5432/gotemplate?sslmode=disable"
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "25"
      DB_CONN_MAX_LIFETIME: "30m"
      DB_CONN_MAX_IDLETIME: "5m"
      DB_CONN_TIMEOUT: "5s"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
